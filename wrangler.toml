name = "sde-claw"
main = "worker/index.js"
compatibility_date = "2026-04-16"
compatibility_flags = ["nodejs_compat"]

[assets]
directory = "./dist"
binding = "ASSETS"
not_found_handling = "single-page-application"
# Worker handles /api/* first; all other paths serve static files directly
run_worker_first = ["/api/*"]

# Observability: log Worker requests for debugging
[observability]
enabled = true
